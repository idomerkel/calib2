<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Target - Temporal Scanner</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <script>
        var Module = { 
            onRuntimeInitialized: function() { 
                onOpenCvReady(); 
            } 
        };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onerror="document.getElementById('status').innerText='Error loading OpenCV';"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #121212; color: white; margin: 0; display: flex; height: 100dvh; overflow: hidden; }
        .sidebar { width: 250px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; z-index: 100; }
        .target-btn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; }
        .target-btn.active { background: #0056b3; border-color: #00aaff; }
        .target-btn:hover { background: #333; }
        .delete-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 0 5px; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; z-index: 100; }
        
        .viewer { flex: 1; position: relative; background: #000; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #displayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; z-index: 10; }
        
        button { background: #00aaff; color: black; border: none; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: background 0.2s; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #ff3b30; color: white; animation: pulse 1s infinite; }
        #status { color: #ffaa00; font-size: 12px; font-weight: bold; max-width: 250px; text-align: right; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin: 0 0 15px 0; font-size: 18px;">🎯 Target Folders</h2>
        <button onclick="createNewTarget()" style="margin-bottom: 15px;">➕ New Target</button>
        <div id="targetList"></div>
        <button id="btnCam" onclick="startCamera()" style="margin-top: auto; background: #ffaa00;">📸 Start Camera Feed</button>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2 id="currentTargetName" style="margin: 0; font-size: 20px;">Loading...</h2>
                <span id="status">Waiting for OpenCV...</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="btnBaseline" onclick="setBaseline()" disabled>📸 Set Baseline</button>
                <button id="btnNewShot" class="btn-green" onclick="start3SecondScan()" disabled>🔴 Scan Target (3s)</button>
            </div>
        </div>

        <div class="viewer">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="displayCanvas"></canvas>
            <canvas id="calcCanvas" style="display:none;"></canvas>
        </div>
    </div>

<script>
    window.onerror = function(message) {
        document.getElementById('status').innerText = "ERR: " + message;
        document.getElementById('status').style.color = "#ff4444";
        return true;
    };

    let cvReady = false;
    let stream = null;
    let targets = []; 
    let activeTargetId = null;
    
    // Video Dimensions
    let procW = 640, procH = 480;

    // OpenCV Engine State
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let cropSize = 0, targetRadius = 0, targetCenter = { x: 0, y: 0 };
    
    // Temporal Tracking Variables
    const PROXIMITY = 15.0;
    const REQ_FRAMES = 4; // Must see the hole in 4 distinct frames to confirm
    let candidates = [];
    let isScanning = false;
    let scanStartTime = 0;
    let lastWarpedGray = null; // Used to update the baseline after a scan

    async function onOpenCvReady() {
        try {
            cvReady = true;
            orb = new cv.ORB(1500);
            matcher = new cv.BFMatcher(cv.NORM_HAMMING, true);
            refKP = new cv.KeyPointVector();
            refDesc = new cv.Mat();
            
            document.getElementById('status').innerText = "Loading Saved Data...";
            const savedData = await localforage.getItem('smart_targets_db');
            if (savedData && savedData.length > 0) {
                targets = savedData;
                setActiveTarget(targets[0].id);
            } else {
                createNewTarget("Session 1");
            }
            document.getElementById('status').innerText = "System Ready. Start Camera.";
            document.getElementById('status').style.color = "#00ff00";
        } catch(e) {
            document.getElementById('status').innerText = "Init Error: " + e.message;
        }
    }

    function saveToPhone() {
        localforage.setItem('smart_targets_db', targets).catch(() => console.error("Save Failed"));
    }

    function createNewTarget(name = null) {
        if (!name) name = prompt("Enter Target Name:", "New Target");
        if (!name) return;
        const newTarget = { id: Date.now().toString(), name: name, allHoles: [], lastHoles: [] };
        targets.push(newTarget);
        saveToPhone();
        setActiveTarget(newTarget.id);
    }

    function deleteTarget(id) {
        if(confirm("Delete this target permanently?")) {
            targets = targets.filter(t => t.id !== id);
            saveToPhone();
            if(activeTargetId === id) setActiveTarget(targets.length > 0 ? targets[0].id : null);
            else renderTargetList();
        }
    }

    function setActiveTarget(id) {
        activeTargetId = id;
        renderTargetList();
        const target = targets.find(t => t.id === id);
        if (target) {
            document.getElementById('currentTargetName').innerText = target.name;
            drawTargetState(target);
            
            // If they switch folders, we must clear the live active baseline so they set a new one
            if(refGray) refGray.delete();
            refGray = null;
            document.getElementById('btnNewShot').disabled = true;
            document.getElementById('status').innerText = "Target changed. Set new Baseline.";
            document.getElementById('status').style.color = "#ffaa00";
        }
    }

    function renderTargetList() {
        const list = document.getElementById('targetList');
        list.innerHTML = "";
        targets.forEach(t => {
            const isActive = t.id === activeTargetId ? 'active' : '';
            list.innerHTML += `
                <div class="target-btn ${isActive}" onclick="setActiveTarget('${t.id}')">
                    <span>📁 ${t.name}</span>
                    <span class="delete-btn" onclick="event.stopPropagation(); deleteTarget('${t.id}')">✖</span>
                </div>
            `;
        });
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } })
        .then(s => { 
            stream = s;
            const videoEl = document.getElementById('webcam');
            videoEl.srcObject = stream; 
            
            videoEl.onloadedmetadata = () => {
                let vw = videoEl.videoWidth;
                let vh = videoEl.videoHeight;
                let scale = Math.min(640 / vw, 640 / vh); 
                procW = Math.round(vw * scale);
                procH = Math.round(vh * scale);
                
                document.getElementById('displayCanvas').width = procW;
                document.getElementById('displayCanvas').height = procH;
                document.getElementById('calcCanvas').width = procW;
                document.getElementById('calcCanvas').height = procH;
                
                videoEl.play().then(() => {
                    document.getElementById('btnBaseline').disabled = false; 
                    document.getElementById('btnCam').style.display = 'none';
                    document.getElementById('status').innerText = "Center Target & Lock"; 
                    document.getElementById('status').style.color = "#00aaff";
                });
            };
        }).catch(err => {
            document.getElementById('status').innerText = "Cam Error: " + err.message;
        });
    }

    function grab() {
        let cvs = document.getElementById('calcCanvas');
        let video = document.getElementById('webcam');
        cvs.getContext('2d').drawImage(video, 0, 0, procW, procH); 
        return cv.imread(cvs);
    }

    // --- 1. SETTING THE BASELINE ---
    function setBaseline() {
        if (!activeTargetId || !stream) return;
        const target = targets.find(t => t.id === activeTargetId);
        target.allHoles = []; target.lastHoles = [];
        saveToPhone();

        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY); 
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        
        let contours = new cv.MatVector(), hierarchy = new cv.Mat(); 
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let a = cv.contourArea(contours.get(i));
            if(a > 2000 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
        }
        
        if(!best) { 
            alert("Could not detect the target ring. Ensure the target is centered.");
            frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); 
            return; 
        }

        targetRadius = Math.round(best.radius);
        cropSize = targetRadius * 2 + 60;
        let rx = Math.max(0, best.center.x - cropSize/2), ry = Math.max(0, best.center.y - cropSize/2);
        targetCenter = { x: best.center.x - rx, y: best.center.y - ry };
        
        let roi = frame.roi(new cv.Rect(rx, ry, Math.min(frame.cols-rx, cropSize), Math.min(frame.rows-ry, cropSize)));
        
        if(refGray) refGray.delete();
        refGray = new cv.Mat(); 
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 10, new cv.Scalar(255), -1);
        
        orb.detectAndCompute(refGray, mask, refKP, refDesc);
        
        document.getElementById('btnNewShot').disabled = false;
        document.getElementById('status').innerText = "Target Locked!"; 
        document.getElementById('status').style.color = "#ff3b30";
        drawTargetState(target);
        
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }

    // --- 2. THE 3-SECOND TEMPORAL SCAN ---
    function start3SecondScan() {
        if (!refGray) return;
        
        let btn = document.getElementById('btnNewShot');
        btn.innerText = "SCANNING...";
        btn.classList.replace("btn-green", "btn-red");
        btn.disabled = true;
        document.getElementById('btnBaseline').disabled = true;
        document.getElementById('status').innerText = "Hold phone steady...";
        document.getElementById('status').style.color = "#ff3b30";

        candidates = []; // Reset temporal tracker
        isScanning = true;
        scanStartTime = performance.now();
        
        scanLoop();
    }

    function scanLoop() {
        if (!isScanning) return;

        let now = performance.now();
        // Check if 3 seconds have passed
        if (now - scanStartTime > 3000) {
            endScan();
            return;
        }

        // Process a single frame
        processFrame();
        
        // Decay candidate confidence (if a hole isn't seen in this frame, its score drops)
        candidates.forEach(c => { c.f -= 0.1; });
        candidates = candidates.filter(c => c.f > 0);

        // Loop as fast as the phone allows
        requestAnimationFrame(scanLoop);
    }

    function processFrame() {
        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        
        cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
        orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);
        
        if(!liveDesc.empty()) {
            matcher.match(refDesc, liveDesc, matches);
            let good = [];
            for(let i=0; i<matches.size(); i++) { 
                if(matches.get(i).distance < 48) good.push(matches.get(i));
            }
            
            if(good.length > 10) {
                let srcP = [], dstP = [];
                for(let m of good) { 
                    srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); 
                    dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); 
                }
                
                let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP);
                let matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);
                
                if(!H.empty()) {
                    let invH = new cv.Mat();
                    cv.invert(H, invH, cv.DECOMP_LU);
                    
                    let warped = new cv.Mat(); 
                    cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                    
                    // Save the last successful warp to update the baseline later
                    if(lastWarpedGray) lastWarpedGray.delete();
                    lastWarpedGray = warped.clone();
                    
                    let diff = new cv.Mat(), thresh = new cv.Mat();
                    cv.absdiff(refGray, warped, diff); 
                    cv.threshold(diff, thresh, 50, 255, cv.THRESH_BINARY);
                    
                    let liveMask = cv.Mat.zeros(refGray.rows, refGray.cols, cv.CV_8UC1);
                    cv.circle(liveMask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 15, new cv.Scalar(255), -1);
                    
                    let maskedThresh = new cv.Mat(); 
                    thresh.copyTo(maskedThresh, liveMask);

                    let contours = new cv.MatVector(), hier = new cv.Mat();
                    cv.findContours(maskedThresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    
                    for(let i=0; i<contours.size(); i++) {
                        let cnt = contours.get(i), area = cv.contourArea(cnt);
                        // Original area thresholds
                        if(area > 15 && area < 600) {
                            let M = cv.moments(cnt);
                            let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                            if (Math.hypot(p.x - targetCenter.x, p.y - targetCenter.y) > targetRadius - 15) continue;
                            
                            let hull = new cv.Mat(); 
                            cv.convexHull(cnt, hull);
                            let solidity = area / (cv.contourArea(hull) || 1); 
                            hull.delete();
                            
                            // Original solidity threshold
                            if(solidity > 0.80) {
                                let pFull = cv.matFromArray(3, 1, cv.CV_64F, [p.x, p.y, 1.0]);
                                let dP = new cv.Mat();
                                cv.gemm(H, pFull, 1, new cv.Mat(), 0, dP);
                                let finalX = dP.data64F[0]/dP.data64F[2];
                                let finalY = dP.data64F[1]/dP.data64F[2];
                                
                                // TEMPORAL FILTER LOGIC: Push to Candidates
                                let c = candidates.find(can => Math.hypot(can.x - finalX, can.y - finalY) < PROXIMITY);
                                if (c) {
                                    c.f++; // Increase confidence score
                                } else {
                                    candidates.push({x: finalX, y: finalY, f: 1}); // New candidate
                                }
                                
                                pFull.delete(); dP.delete();
                            }
                        }
                    }
                    invH.delete(); warped.delete(); diff.delete(); thresh.delete(); liveMask.delete(); maskedThresh.delete(); contours.delete(); hier.delete();
                }
                matSrc.delete(); matDst.delete(); H.delete();
            }
        }
        frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
    }

    // --- 3. CONCLUDING THE SCAN ---
    function endScan() {
        isScanning = false;
        const target = targets.find(t => t.id === activeTargetId);
        
        // Filter out noise. Only keep candidates that appeared in at least REQ_FRAMES (4) frames during the 3 seconds.
        let confirmedHoles = candidates.filter(c => c.f >= REQ_FRAMES);
        
        // Filter against holes we already know about in target.allHoles
        let newValidHoles = [];
        for(let h of confirmedHoles) {
            let isOld = target.allHoles.some(old => Math.hypot(old.x - h.x, old.y - h.y) < PROXIMITY);
            if(!isOld) {
                newValidHoles.push({x: h.x, y: h.y});
                target.allHoles.push({x: h.x, y: h.y});
            }
        }

        target.lastHoles = newValidHoles;

        // Update the baseline so the newly confirmed holes become part of the background
        if (lastWarpedGray) {
            refGray.delete();
            refGray = lastWarpedGray.clone();
            // Re-compute keypoints for the new baseline
            let mask = cv.Mat.zeros(refGray.rows, refGray.cols, cv.CV_8UC1);
            cv.circle(mask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 10, new cv.Scalar(255), -1);
            orb.detectAndCompute(refGray, mask, refKP, refDesc);
            mask.delete();
        }

        saveToPhone();
        drawTargetState(target);

        // Reset UI
        let btn = document.getElementById('btnNewShot');
        btn.innerText = "🔴 Scan Target (3s)";
        btn.classList.replace("btn-red", "btn-green");
        btn.disabled = false;
        document.getElementById('btnBaseline').disabled = false;
        
        document.getElementById('status').innerText = `Scan Complete. ${newValidHoles.length} New Shots.`;
        document.getElementById('status').style.color = "#00ff00";
    }

    // --- UI DRAWING ---
    function drawTargetState(target) {
        let cvs = document.getElementById('displayCanvas');
        let ctx = cvs.getContext('2d');
        ctx.clearRect(0, 0, procW, procH);
        
        if (!target) return;

        target.allHoles.forEach(h => {
            if (target.lastHoles.some(lh => lh.x === h.x && lh.y === h.y)) return; // Skip if it's new
            ctx.beginPath();
            ctx.arc(h.x, h.y, 8, 0, 6.28); 
            ctx.strokeStyle="rgba(255,0,0,0.8)"; 
            ctx.lineWidth = 3;
            ctx.stroke();
        });

        target.lastHoles.forEach(h => {
            ctx.beginPath();
            ctx.arc(h.x, h.y, 8, 0, 6.28); 
            ctx.strokeStyle="rgba(0,255,0,0.9)"; 
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Crosshair for new shots
            ctx.moveTo(h.x - 12, h.y); ctx.lineTo(h.x + 12, h.y);
            ctx.moveTo(h.x, h.y - 12); ctx.lineTo(h.x, h.y + 12);
            ctx.stroke();
        });
    }
</script>
</body>
</html>
